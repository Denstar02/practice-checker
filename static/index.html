<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Анализатор отчётов по педагогической практике</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',system-ui,sans-serif;background:#f5f6fa;color:#1e293b;min-height:100vh;display:flex;flex-direction:column;position:relative}
    .mono{font-family:'JetBrains Mono',monospace}

    /* Page-level beams (subtle on light bg) */
    .page-beams{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0}
    .page-beams svg{position:absolute;width:100%;height:100%}
    .beam-bg{stroke:rgba(99,102,241,.06);stroke-width:.5;fill:none}
    .beam{stroke-width:.5;fill:none;stroke-opacity:0;stroke-dasharray:120 680}
    @keyframes beam{0%{stroke-dashoffset:800;stroke-opacity:0}5%{stroke-opacity:.3}50%{stroke-opacity:.15}95%{stroke-opacity:.3}100%{stroke-dashoffset:-800;stroke-opacity:0}}
    .beam{animation:beam linear infinite}

    /* Topbar */
    .topbar{background:rgba(255,255,255,.82);backdrop-filter:blur(16px);color:#1e293b;padding:0 28px;height:56px;display:flex;align-items:center;gap:14px;flex-shrink:0;position:sticky;top:0;z-index:100;border-bottom:1px solid #e5e7eb}
    .topbar .logo{display:flex;align-items:center;gap:10px}
    .topbar .logo-icon{width:32px;height:32px;border-radius:10px;background:#eef2ff;display:flex;align-items:center;justify-content:center}
    .topbar h1{font-size:15px;font-weight:700;letter-spacing:-.3px;color:#1e293b}
    .topbar .sep{width:1px;height:24px;background:#e5e7eb;margin:0 6px}
    .topbar .model-area{display:flex;align-items:center;gap:8px;margin-left:auto}
    .topbar .badge{font-size:9px;font-weight:600;color:#059669;background:#ecfdf5;padding:2px 8px;border-radius:8px;letter-spacing:.5px;text-transform:uppercase;border:1px solid #a7f3d0}
    .model-picker{position:relative}
    .mp-current{display:flex;align-items:center;gap:6px;padding:4px 6px 4px 10px;border-radius:10px;background:#f8f9fb;border:1px solid #e5e7eb;font-size:12px}
    .mp-name{font-weight:600;color:#1e293b;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .mp-rec{font-size:8px;font-weight:700;color:#059669;background:#ecfdf5;border:1px solid #a7f3d0;padding:1px 5px;border-radius:5px;text-transform:uppercase;letter-spacing:.3px}
    .mp-change{padding:3px 8px;border:none;border-radius:6px;background:#eef2ff;color:#6366f1;font-size:10px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;white-space:nowrap}
    .mp-change:hover{background:#ddd8fe}
    .mp-dropdown{position:absolute;top:calc(100% + 6px);right:0;background:#fff;border:1px solid #e5e7eb;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.1);padding:6px;min-width:300px;z-index:200;display:none}
    .mp-dropdown.open{display:block}
    .mp-opt{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:background .15s}
    .mp-opt:hover{background:#f8f8ff}
    .mp-opt.active{background:#eef2ff}
    .mp-opt .mp-o-name{font-size:12px;font-weight:600;color:#1e293b;flex:1}
    .mp-opt .mp-o-desc{font-size:10px;color:#94a3b8;margin-top:1px}
    .mp-opt .mp-o-rec{font-size:8px;font-weight:700;color:#059669;background:#ecfdf5;border:1px solid #a7f3d0;padding:1px 5px;border-radius:5px}
    .mp-opt .mp-o-check{color:#6366f1;flex-shrink:0;opacity:0}
    .mp-opt.active .mp-o-check{opacity:1}
    .mp-overlay{position:fixed;inset:0;z-index:199;display:none}
    .mp-overlay.open{display:block}

    /* Layout */
    .layout{display:flex;flex:1;overflow:hidden;position:relative;z-index:1}
    .sidebar{width:300px;min-width:300px;background:rgba(255,255,255,.88);backdrop-filter:blur(16px);border-right:1px solid #e5e7eb;display:none;flex-direction:column;overflow:hidden}
    .sidebar.visible{display:flex}
    .main{flex:1;overflow-y:auto;padding:24px 32px 48px}
    .main.centered{max-width:1100px;margin:0 auto}

    /* Sidebar */
    .sb-header{padding:16px 20px;border-bottom:1px solid #f0f0f3;font-size:12px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;justify-content:space-between}
    .sb-header .cnt{font-weight:600;color:#6366f1;font-size:11px;background:#eef2ff;padding:2px 8px;border-radius:8px}
    .sb-add{padding:10px 20px;border-bottom:1px solid #f0f0f3;cursor:pointer;transition:background .2s;text-align:center;font-size:12px;font-weight:600;color:#6366f1;display:flex;align-items:center;justify-content:center;gap:6px}
    .sb-add:hover{background:#eef2ff}
    .sb-files{flex:1;overflow-y:auto;padding:8px 12px}

    .sf{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;margin-bottom:4px;transition:background .15s;cursor:default}
    .sf:hover{background:#f8f8ff}
    .sf .sf-icon{width:32px;height:32px;border-radius:8px;background:#f0f0f5;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .sf .sf-info{flex:1;min-width:0}
    .sf .sf-name{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#1e293b}
    .sf .sf-meta{font-size:10px;color:#94a3b8}
    .sf .sf-status{font-size:10px;font-weight:600;padding:2px 8px;border-radius:6px;white-space:nowrap}
    .sfs-wait{background:#f0f0f5;color:#94a3b8}
    .sfs-run{background:#eef2ff;color:#6366f1}
    .sfs-done{background:#ecfdf5;color:#059669}
    .sfs-err{background:#fef2f2;color:#dc2626}
    .sf .sf-score{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;min-width:28px;text-align:right}
    .sf .sf-rm{width:24px;height:24px;border:none;background:none;cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#cbd5e1;transition:all .15s;flex-shrink:0}
    .sf .sf-rm:hover{background:#fef2f2;color:#ef4444}

    .sb-action{padding:12px 20px;border-top:1px solid #f0f0f3}
    .sb-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;border-radius:12px;border:none;font-size:13px;font-weight:700;color:#fff;cursor:pointer;background:linear-gradient(135deg,#6366f1,#7c3aed);box-shadow:0 2px 12px rgba(99,102,241,.2);transition:all .2s;font-family:'Inter',sans-serif}
    .sb-btn:hover{box-shadow:0 4px 20px rgba(99,102,241,.3)}.sb-btn:active{transform:scale(.98)}
    .sb-btn:disabled{background:#cbd5e1;box-shadow:none;cursor:wait}

    /* Progress */
    .pbar-wrap{padding:12px 20px;border-top:1px solid #f0f0f3}
    .pbar-info{display:flex;justify-content:space-between;font-size:11px;color:#94a3b8;margin-bottom:4px}
    .pbar{height:6px;background:#e5e7eb;border-radius:6px;overflow:hidden}
    .pbar-fill{height:100%;background:linear-gradient(90deg,#6366f1,#7c3aed);border-radius:6px;transition:width .4s ease}

    /* Center upload */
    .center-upload{border-radius:20px;border:2px dashed #d4d8e8;padding:64px 32px;text-align:center;cursor:pointer;transition:all .3s;margin-top:8px;background:rgba(255,255,255,.7);position:relative;overflow:hidden}
    .center-upload:hover{border-color:#a5b4fc;transform:translateY(-2px);box-shadow:0 8px 40px rgba(99,102,241,.08);background:#fff}
    .center-upload.drag{border-color:#6366f1;box-shadow:0 0 0 4px rgba(99,102,241,.1);background:#fafaff}
    .cu-icon{width:64px;height:64px;border-radius:20px;background:#eef2ff;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;position:relative;z-index:2}
    .cu-tag{font-size:11px;color:#6366f1;background:#eef2ff;padding:4px 12px;border-radius:8px;font-weight:500;border:1px solid #ddd8fe}
    .welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;color:#94a3b8;padding:40px}

    /* Bento criteria */
    .sl{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:#94a3b8;margin-bottom:12px}
    .bg-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:24px}
    .bc{border-radius:14px;padding:18px;position:relative;overflow:hidden;transition:all .2s;cursor:default;border:1px solid #e5e7eb;background:rgba(255,255,255,.7)}
    .bc:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.04)}
    .bc .blob{position:absolute;right:-24px;top:-24px;width:100px;height:100px;border-radius:50%;opacity:.12}
    .bc .iw{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
    .bc h3{font-size:13px;font-weight:700;margin-bottom:4px;line-height:1.3;color:#1e293b}
    .bc p{font-size:11px;color:#94a3b8;line-height:1.5}

    /* Table */
    .stbl{width:100%;border-collapse:separate;border-spacing:0;font-size:13px;border-radius:14px;overflow:hidden;border:1px solid #e5e7eb;background:#fff;margin-bottom:20px}
    .stbl th{background:#f8f9fb;padding:12px 16px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8;border-bottom:1px solid #e5e7eb}
    .stbl td{padding:12px 16px;border-bottom:1px solid #f5f5f8;vertical-align:middle;color:#475569}
    .stbl tr:last-child td{border-bottom:none}
    .stbl tr:hover td{background:#fafaff}
    .stbl .sc{font-family:'JetBrains Mono',monospace;font-weight:700}
    .stbl .fname-cell{font-weight:600;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#1e293b}

    .status-badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
    .sd{background:#ecfdf5;color:#059669;border:1px solid #a7f3d0}
    .sp{background:#fffbeb;color:#b45309;border:1px solid #fde68a}
    .sm{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
    .ebox{display:flex;align-items:flex-start;gap:10px;border-radius:12px;border:1px solid #fecaca;background:#fef2f2;padding:12px 16px;margin-bottom:10px;font-size:12px;color:#dc2626;line-height:1.5}

    /* Per-file results */
    .rfile{border-radius:14px;border:1px solid #e5e7eb;background:#fff;overflow:hidden;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.03)}
    .rfile-h{padding:14px 18px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .15s}
    .rfile-h:hover{background:#fafaff}
    .rfile-h .rn{font-size:13px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#1e293b}
    .rfile-b{display:none;border-top:1px solid #f0f0f3;padding:18px}
    .rfile-b.open{display:block}
    .chevron{transition:transform .3s;color:#cbd5e1;flex-shrink:0}.chevron.open{transform:rotate(180deg)}
    .ms{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
    .mc{border-radius:10px;background:#f8f9fb;padding:10px;text-align:center}
    .mc .s{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:700}
    .mc .n{font-size:9px;color:#94a3b8;font-weight:500;margin-top:2px}
    .crit-card{border-radius:10px;border:1px solid #f0f0f3;overflow:hidden;margin-bottom:6px}
    .crit-h{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .15s}
    .crit-h:hover{background:#fafaff}
    .crit-h .ct{flex:1;min-width:0}
    .crit-h h5{font-size:12px;font-weight:600;margin-bottom:2px;color:#1e293b}
    .crit-b{display:none;padding:0 14px 14px;border-top:1px solid #f5f5f8}
    .crit-b.open{display:block}
    .crit-b .cm{font-size:12px;line-height:1.7;color:#64748b;padding-top:10px;margin-bottom:10px}
    .tag-section{margin-bottom:10px}
    .tag-label{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
    .tags{display:flex;flex-wrap:wrap;gap:4px}
    .tag{padding:2px 8px;border-radius:6px;font-size:10px;border:1px solid}
    .tg{background:#ecfdf5;color:#059669;border-color:#a7f3d0}
    .tr{background:#fef2f2;color:#dc2626;border-color:#fecaca}
    .rlist{padding-left:16px}.rlist li{font-size:11px;line-height:1.6;color:#64748b;margin-bottom:2px}
    .rbtn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;border-radius:12px;border:1px solid #e5e7eb;background:#fff;font-size:13px;font-weight:600;color:#64748b;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif}
    .rbtn:hover{border-color:#c7d2fe;color:#6366f1;background:#fafaff}

    /* Criteria editor */
    .crit-editor{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:20px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.03)}
    .ce-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .ce-header h3{font-size:14px;font-weight:700;color:#1e293b}
    .ce-item{background:#f8f9fb;border:1px solid #e5e7eb;border-radius:12px;padding:14px;margin-bottom:8px;position:relative}
    .ce-item:hover{border-color:#c7d2fe}
    .ce-item input,.ce-item textarea{width:100%;background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:8px 12px;color:#1e293b;font-family:'Inter',sans-serif;font-size:13px;outline:none;resize:vertical}
    .ce-item input:focus,.ce-item textarea:focus{border-color:#a5b4fc;box-shadow:0 0 0 3px rgba(99,102,241,.08)}
    .ce-item input{margin-bottom:6px;font-weight:600}
    .ce-item textarea{min-height:48px;font-size:12px;color:#64748b}
    .ce-item .ce-rm{position:absolute;top:10px;right:10px;width:24px;height:24px;border:none;background:#fef2f2;color:#ef4444;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s}
    .ce-item:hover .ce-rm{opacity:1}
    .ce-add{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px;border-radius:10px;border:1px dashed #c7d2fe;background:transparent;color:#6366f1;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;margin-top:4px}
    .ce-add:hover{background:#eef2ff;border-color:#6366f1}
    .edit-btn{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:8px;border:1px solid #e5e7eb;background:#fff;color:#64748b;font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
    .edit-btn:hover{border-color:#c7d2fe;color:#6366f1;background:#fafaff}
    .ce-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:#94a3b8;margin-bottom:6px}

    .hidden{display:none!important}
    @keyframes spin{to{transform:rotate(360deg)}}
    .spinner{width:16px;height:16px;border:2px solid #e5e7eb;border-top-color:#6366f1;border-radius:50%;animation:spin .8s linear infinite;display:inline-block}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.fu{animation:fadeUp .4s ease forwards}

    @media(max-width:800px){
      .layout{flex-direction:column}
      .sidebar.visible{width:100%;min-width:0;max-height:35vh;border-right:none;border-bottom:1px solid #e5e7eb}
      .main{padding:16px 14px 40px}
      .main.centered{max-width:100%}
      .bg-grid{grid-template-columns:1fr 1fr;gap:10px}
      .bc{padding:14px}.bc h3{font-size:12px}.bc p{font-size:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
      .bc .iw{width:30px;height:30px;border-radius:8px}
      .ms{grid-template-columns:repeat(2,1fr)}
      .stbl{font-size:11px}.stbl th,.stbl td{padding:8px 10px}
      .center-upload{padding:40px 20px;margin-top:4px}
      .topbar{padding:0 14px;gap:8px;height:auto;min-height:50px;flex-wrap:wrap;padding-top:8px;padding-bottom:8px}
      .topbar .sep{display:none}.topbar>span{display:none}
      .topbar .badge{font-size:8px;padding:2px 6px}
      .topbar h1{font-size:14px}
      .mp-current{padding:3px 5px 3px 8px;gap:4px}
      .mp-name{max-width:100px;font-size:11px}
      .mp-rec{font-size:7px}
      .mp-change{font-size:9px;padding:2px 6px}
      .mp-dropdown{min-width:240px;right:-10px}
      .topbar .logo-icon{width:28px;height:28px;border-radius:8px}
      .rfile-h{padding:12px 14px;gap:10px}.rfile-b{padding:14px}
      .crit-h{padding:10px 12px;gap:8px}.crit-b{padding:0 12px 12px}
      .ce-item .ce-rm{opacity:1}
    }
    @media(max-width:480px){
      .bg-grid{grid-template-columns:1fr}
      .ms{grid-template-columns:repeat(2,1fr);gap:6px}
      .mc{padding:8px}.mc .s{font-size:15px}
      .topbar .logo-icon{display:none}
      .center-upload{padding:32px 16px;border-radius:14px}
      .cu-icon{width:52px;height:52px}
      .sf{padding:8px 10px;gap:8px}
      .sf .sf-icon{width:28px;height:28px}
      .sf .sf-name{font-size:11px}
    }
  </style>
</head>
<body>

    </defs>
    <path class="beam" d="M-380 -189C-380 -189 -312 216 152 343C616 470 684 875 684 875" stroke="url(#bg1)" style="animation-duration:8s;animation-delay:0s"/>
    <path class="beam" d="M-338 -237C-338 -237 -270 168 194 295C658 422 726 827 726 827" stroke="url(#bg2)" style="animation-duration:12s;animation-delay:2s"/>
    <path class="beam" d="M-296 -285C-296 -285 -228 120 236 247C700 374 768 779 768 779" stroke="url(#bg1)" style="animation-duration:10s;animation-delay:4s"/>
    <path class="beam" d="M-254 -333C-254 -333 -186 72 278 199C742 326 810 731 810 731" stroke="url(#bg3)" style="animation-duration:14s;animation-delay:1s"/>

<script>
const files=[];let isRunning=false;let editorOpen=false;
const ACCENTS=["#6366f1","#f59e0b","#10b981","#ec4899","#8b5cf6","#06b6d4","#f97316","#14b8a6","#e11d48","#7c3aed"];
const ICONS=[
  '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/></svg>',
  '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>',
  '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="16" y="16" width="6" height="6" rx="1"/><rect x="2" y="16" width="6" height="6" rx="1"/><rect x="9" y="2" width="6" height="6" rx="1"/><path d="M5 16v-3a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3"/><path d="M12 12V8"/></svg>',
  '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" x2="6" y1="3" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/></svg>',
  '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>',
  '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>',
];

let CRITERIA=[
  {id:1,title:"Анализ нормативной документации",short:"Анализ нормативной документации",desc:"ФГОС СПО, ОПОП, учебный план, рабочие программы дисциплин, профессиональных модулей, МДК. Подробный анализ рабочей программы."},
  {id:2,title:"Место дисциплины",short:"Место дисциплины",desc:"Вклад дисциплины в компетенции. Курс, объём, виды нагрузки, распределение времени. Табличное представление."},
  {id:3,title:"Междисциплинарные связи",short:"Междисциплинарные связи",desc:"Предшествующие, сопутствующие и последующие связи дисциплины. Базовые темы из ПМ и МДК. Схема связей."},
  {id:4,title:"Внутридисциплинарные связи",short:"Внутридисциплинарные связи",desc:"Анализ тематического (КТП) плана. Связи темы. Схема или текстовое описание."},
];

function getAccent(i){return ACCENTS[i%ACCENTS.length]}
function getIcon(i){return ICONS[i%ICONS.length]}

// Render bento grid from CRITERIA
function renderBento(){
  const grid=document.getElementById("bentoGrid");
  grid.innerHTML=CRITERIA.map((c,i)=>{
    const a=getAccent(i);
    return`<div class="bc" style="background:linear-gradient(135deg,${a}08 0%,#fff 70%);border-color:${a}20"><div class="blob" style="background:radial-gradient(circle,${a} 0%,transparent 70%)"></div><div style="position:relative;z-index:1"><div class="iw" style="background:${a}12;color:${a}">${getIcon(i)}</div><h3>${c.short||c.title}</h3><p>${c.desc}</p></div></div>`
  }).join("");
}
renderBento();

// Criteria editor
function toggleEditor(){
  editorOpen=!editorOpen;
  document.getElementById("critEditor").classList.toggle("hidden",!editorOpen);
  document.getElementById("bentoGrid").classList.toggle("hidden",editorOpen);
  document.getElementById("editBtnText").textContent=editorOpen?"Готово":"Настроить";
  if(editorOpen)renderEditor();
  else renderBento();
}

function renderEditor(){
  const list=document.getElementById("ceList");
  document.getElementById("ceCount").textContent=`${CRITERIA.length} ${CRITERIA.length===1?"критерий":CRITERIA.length<5?"критерия":"критериев"}`;
  list.innerHTML=CRITERIA.map((c,i)=>`
    <div class="ce-item">
      <div class="ce-num">Критерий ${i+1}</div>
      <input value="${c.title}" placeholder="Название критерия" oninput="updCrit(${i},'title',this.value)">
      <textarea placeholder="Описание: что проверять" oninput="updCrit(${i},'desc',this.value)">${c.desc}</textarea>
      ${CRITERIA.length>1?`<button class="ce-rm" onclick="rmCrit(${i})"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>`:""}
    </div>`).join("");
}

function updCrit(i,field,val){
  CRITERIA[i][field]=val;
  if(field==="title")CRITERIA[i].short=val.length>16?val.substring(0,16)+"…":val;
}

function addCriterion(){
  CRITERIA.push({id:Date.now(),title:"",short:"Новый критерий",desc:""});
  renderEditor();
  // Focus the new input
  const inputs=document.querySelectorAll("#ceList .ce-item input");
  if(inputs.length)inputs[inputs.length-1].focus();
}

function rmCrit(i){
  CRITERIA.splice(i,1);
  renderEditor();
}

// Build criteria payload for server
function getCriteriaPayload(){
  return CRITERIA.filter(c=>c.title.trim()).map(c=>({title:c.title,description:c.desc}));
}

// Models
// Models with recommended flag
const RECOMMENDED="meta-llama/Llama-3.3-70B-Instruct";
let allModels=[];
let selectedModel=RECOMMENDED;

(async()=>{
  try{
    const r=await fetch("/api/models");allModels=await r.json();
    // If recommended not in list, use first
    if(!allModels.find(m=>m.id===RECOMMENDED)&&allModels.length)selectedModel=allModels[0].id;
    // Also populate hidden select for backwards compat
    const s=document.getElementById("modelSel");s.innerHTML="";
    allModels.forEach(x=>{const o=document.createElement("option");o.value=x.id;o.textContent=x.name;s.appendChild(o)});
    s.value=selectedModel;
    updateModelDisplay();
  }catch(e){console.warn(e)}
})();

function updateModelDisplay(){
  const m=allModels.find(x=>x.id===selectedModel);
  document.getElementById("mpName").textContent=m?m.name:selectedModel.split("/").pop();
  document.getElementById("modelSel").value=selectedModel;
  renderModelDropdown();
}

function renderModelDropdown(){
  const dd=document.getElementById("mpDropdown");
  dd.innerHTML=`<div style="padding:8px 12px 6px;font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:1px">Выберите модель</div>`+
  allModels.map(m=>{
    const isActive=m.id===selectedModel;
    const isRec=m.id===RECOMMENDED;
    return`<div class="mp-opt${isActive?" active":""}" onclick="selectModel('${m.id}')">
      <div style="flex:1;min-width:0">
        <div class="mp-o-name">${m.name}${isRec?' <span class="mp-o-rec">рекомендуется</span>':''}</div>
        <div class="mp-o-desc">${m.id}</div>
      </div>
      <svg class="mp-o-check" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m5 12 5 5L20 7"/></svg>
    </div>`;
  }).join("");
}

function toggleModelPicker(){
  const dd=document.getElementById("mpDropdown");
  const ov=document.getElementById("mpOverlay");
  dd.classList.toggle("open");
  ov.classList.toggle("open");
}

function selectModel(id){
  selectedModel=id;
  updateModelDisplay();
  toggleModelPicker();
}

// Upload - center zone + drag on main
const zone=document.getElementById("uploadZone"),inp=document.getElementById("fileInput");
zone.addEventListener("click",()=>inp.click());
zone.addEventListener("dragover",e=>{e.preventDefault();zone.classList.add("drag")});
zone.addEventListener("dragleave",()=>zone.classList.remove("drag"));
zone.addEventListener("drop",e=>{e.preventDefault();zone.classList.remove("drag");addFiles(e.dataTransfer.files)});
inp.addEventListener("change",()=>{addFiles(inp.files);inp.value=""});

// Also allow drop on entire main area
const mainEl=document.querySelector(".main");
mainEl.addEventListener("dragover",e=>{e.preventDefault();zone.classList.add("drag")});
mainEl.addEventListener("dragleave",e=>{if(!mainEl.contains(e.relatedTarget))zone.classList.remove("drag")});
mainEl.addEventListener("drop",e=>{e.preventDefault();zone.classList.remove("drag");addFiles(e.dataTransfer.files)});

async function addFiles(fl){
  hideError();
  for(const f of fl){
    if(files.length>=50){showError("Максимум 50 файлов");break}
    if(files.find(x=>x.name===f.name))continue;
    const entry={file:f,name:f.name,size:f.size,text:"",status:"extracting",result:null,error:null};
    files.push(entry);renderFileList();
    try{entry.text=await extractText(f);entry.status="ready"}catch(e){entry.status="error";entry.error="Ошибка: "+e.message}
    renderFileList();
  }
  updateBtn();
}
function removeFile(idx){
  files.splice(idx,1);
  renderFileList();
  updateBtn();
  // Обновить результаты если они отображаются
  const ra=document.getElementById("resultsArea");
  if(!ra.classList.contains("hidden")&&files.some(f=>f.status==="done")){renderResults()}
  else if(!files.some(f=>f.status==="done")){ra.classList.add("hidden");ra.innerHTML="";document.getElementById("welcomeArea").classList.remove("hidden")}
  if(!files.length){document.getElementById("actionArea").classList.add("hidden")}
}

function updateBtn(){
  const ready=files.filter(f=>f.status==="ready").length;
  const act=document.getElementById("actionArea");
  const addMore=document.getElementById("sbAddMore");
  const sb=document.querySelector(".sidebar");
  const mn=document.querySelector(".main");
  if(ready>0){act.classList.remove("hidden");document.getElementById("btnText").textContent=`Анализ (${ready} ${ready===1?"файл":ready<5?"файла":"файлов"})`}
  else if(!files.length){act.classList.add("hidden")}
  // Show/hide sidebar
  if(files.length>0){sb.classList.add("visible");mn.classList.remove("centered");addMore.classList.remove("hidden")}
  else{sb.classList.remove("visible");mn.classList.add("centered");addMore.classList.add("hidden")}
  document.getElementById("fileCount").style.display=files.length?"inline":"none";
  document.getElementById("fileCount").textContent=files.length;
}

function renderFileList(){
  const el=document.getElementById("fileList");
  el.innerHTML=files.map((f,i)=>{
    let st="",cls="";
    if(f.status==="extracting"){st="...";cls="sfs-run"}
    else if(f.status==="ready"){st="готов";cls="sfs-wait"}
    else if(f.status==="analyzing"){st='<span class="spinner"></span>';cls="sfs-run"}
    else if(f.status==="done"){st=`<span class="sf-score" style="color:${sColor(f.result?.overall_score)}">${f.result?.overall_score??"-"}</span>`;cls="sfs-done"}
    else{st="!";cls="sfs-err"}
    return`<div class="sf">
      <div class="sf-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg></div>
      <div class="sf-info"><div class="sf-name">${f.name}</div><div class="sf-meta">${(f.size/1024).toFixed(0)} КБ${f.text?` • ${(f.text.length/1000).toFixed(1)}k`:""}</div></div>
      <div class="sf-status ${cls}">${st}</div>
      ${f.status==="analyzing"?"":`<button class="sf-rm" onclick="removeFile(${i})"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>`}</div>`
  }).join("");
}

function sColor(s){return s>=70?"#059669":s>=40?"#d97706":"#dc2626"}

async function extractText(file){
  const ext=file.name.split(".").pop().toLowerCase();
  if(ext==="txt")return await file.text();
  if(ext==="docx"){return(await mammoth.extractRawText({arrayBuffer:await file.arrayBuffer()})).value}
  if(ext==="pdf"){
    const raw=new TextDecoder("utf-8",{fatal:false}).decode(new Uint8Array(await file.arrayBuffer()));let t="";
    (raw.match(/\(([^)]*)\)\s*Tj/g)||[]).forEach(m=>{const x=m.match(/\(([^)]*)\)/);if(x)t+=x[1]+" "});
    (raw.match(/\[([^\]]*)\]\s*TJ/gi)||[]).forEach(m=>{(m.match(/\(([^)]*)\)/g)||[]).forEach(p=>{const x=p.match(/\(([^)]*)\)/);if(x)t+=x[1]});t+=" "});
    return t.trim().length<50?"⚠️ PDF: текст не извлечён":t;
  }
  throw new Error("Неподдерживаемый формат");
}

async function startBatch(){
  if(editorOpen)toggleEditor(); // close editor
  const ready=files.filter(f=>f.status==="ready"||f.status==="error");
  if(!ready.length)return;
  isRunning=true;const btn=document.getElementById("analyzeBtn");btn.disabled=true;
  document.getElementById("btnText").textContent="Анализ...";
  hideError();document.getElementById("resultsArea").classList.add("hidden");
  const total=ready.length;let done=0;
  document.getElementById("pbarWrap").classList.remove("hidden");
  const model=selectedModel;
  for(const f of ready){
    f.status="analyzing";f.result=null;f.error=null;renderFileList();
    document.getElementById("pbarLabel").textContent=f.name;
    document.getElementById("pbarPct").textContent=`${done}/${total}`;
    document.getElementById("pbarFill").style.width=Math.round(done/total*100)+"%";
    try{
      const res=await fetch("/api/analyze",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({text:f.text,model,criteria:getCriteriaPayload()})});
      if(!res.ok){const e=await res.json().catch(()=>({error:`HTTP ${res.status}`}));throw new Error(e.error||`HTTP ${res.status}`)}
      const data=await res.json();if(data.error)throw new Error(data.error);
      f.result=data;f.status="done";
    }catch(e){f.status="error";f.error=e.message}
    done++;renderFileList();
  }
  document.getElementById("pbarFill").style.width="100%";
  document.getElementById("pbarPct").textContent=`${total}/${total}`;
  setTimeout(()=>document.getElementById("pbarWrap").classList.add("hidden"),600);
  isRunning=false;btn.disabled=false;document.getElementById("btnText").textContent="Повторить";
  renderFileList();
  renderResults();
}

function renderResults(){
  document.getElementById("welcomeArea").classList.add("hidden");
  const area=document.getElementById("resultsArea");area.classList.remove("hidden");
  const ok=files.filter(f=>f.status==="done"),fail=files.filter(f=>f.status==="error");
  let h="";

  if(ok.length){
    const avg=Math.round(ok.reduce((s,f)=>s+(f.result?.overall_score||0),0)/ok.length);
    h+=`<div class="sl">Сводная таблица — ${ok.length} отчётов, средний: <span style="color:${sColor(avg)};font-size:12px">${avg}</span></div>
    <div style="overflow-x:auto"><table class="stbl"><thead><tr><th>Файл</th><th style="text-align:center">Общий</th>${CRITERIA.map(c=>`<th style="text-align:center">${c.short||c.title.substring(0,16)}</th>`).join("")}<th>Статус</th></tr></thead><tbody>`;
    ok.forEach(f=>{const r=f.result,sc=r?.overall_score||0;
      h+=`<tr><td class="fname-cell">${f.name}</td><td style="text-align:center"><span class="sc" style="font-size:16px;color:${sColor(sc)}">${sc}</span></td>${CRITERIA.map((_,i)=>{const s=r?.criteria?.[i]?.score;return`<td style="text-align:center"><span class="sc" style="font-size:13px;color:${sColor(s)}">${s??"-"}</span></td>`}).join("")}<td>${sc>=70?'<span class="status-badge sd">соотв.</span>':sc>=40?'<span class="status-badge sp">доработка</span>':'<span class="status-badge sm">переработка</span>'}</td></tr>`});
    h+=`</tbody></table></div>`;
  }

  if(fail.length){h+=`<div class="sl" style="color:#b91c1c;margin-top:16px">Ошибки (${fail.length})</div>`;fail.forEach(f=>{h+=`<div class="ebox"><b>${f.name}:</b> ${f.error}</div>`})}

  if(ok.length){
    h+=`<div class="sl" style="margin-top:20px">Подробные результаты</div>`;
    ok.forEach(f=>{const r=f.result,sc=r?.overall_score||0;const circ=2*Math.PI*18,off=circ*(1-sc/100);
      h+=`<div class="rfile"><div class="rfile-h" onclick="tog(this)">
        <div style="position:relative;width:40px;height:40px;flex-shrink:0"><svg width="40" height="40" style="transform:rotate(-90deg)"><circle cx="20" cy="20" r="16" fill="none" stroke="#e5e7eb" stroke-width="3"/><circle cx="20" cy="20" r="16" fill="none" stroke="${sColor(sc)}" stroke-width="3" stroke-dasharray="${circ}" stroke-dashoffset="${off}" stroke-linecap="round"/></svg><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center"><span class="mono" style="font-size:12px;font-weight:700;color:${sColor(sc)}">${sc}</span></div></div>
        <div class="rn">${f.name}</div>
        <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
      </div><div class="rfile-b">
        <p style="font-size:12px;color:#64748b;margin-bottom:12px;line-height:1.6">${r?.overall_summary||""}</p>
        <div class="ms">${CRITERIA.map((_,i)=>{const s=r?.criteria?.[i]?.score||0;return`<div class="mc"><div class="s" style="color:${sColor(s)}">${s}</div><div class="n">${CRITERIA[i].short||CRITERIA[i].title.substring(0,16)}</div></div>`}).join("")}</div>
        ${CRITERIA.map((c,i)=>{const cr=r?.criteria?.[i];if(!cr)return"";const stc=cr.status==="выполнено"?"sd":cr.status==="не выполнено"?"sm":"sp";const ac=getAccent(i);
          return`<div class="crit-card"><div class="crit-h" onclick="tog(this)"><div style="color:${ac}">${getIcon(i)}</div><div class="ct"><h5>${c.title}</h5><span class="status-badge ${stc}">${cr.status}</span></div><span class="mono" style="font-size:12px;font-weight:700;color:${sColor(cr.score)}">${cr.score}</span><svg class="chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg></div>
          <div class="crit-b"><div class="cm">${cr.comment||""}</div>
          ${cr.found_elements?.length?`<div class="tag-section"><div class="tag-label" style="color:#059669">✓ Обнаружено</div><div class="tags">${cr.found_elements.map(e=>`<span class="tag tg">${e}</span>`).join("")}</div></div>`:""}
          ${cr.missing_elements?.length?`<div class="tag-section"><div class="tag-label" style="color:#dc2626">✗ Отсутствует</div><div class="tags">${cr.missing_elements.map(e=>`<span class="tag tr">${e}</span>`).join("")}</div></div>`:""}
          ${cr.recommendations?.length?`<div class="tag-section"><div class="tag-label" style="color:#6366f1">💡 Рекомендации</div><ul class="rlist">${cr.recommendations.map(e=>`<li>${e}</li>`).join("")}</ul></div>`:""}
          </div></div>`}).join("")}
      </div></div>`});
  }

  h+=`<button class="rbtn" onclick="resetAll()" style="margin-top:12px">↻ Начать заново</button>`;
  area.innerHTML=h;
}

function tog(el){el.nextElementSibling.classList.toggle("open");el.querySelector(".chevron").classList.toggle("open")}
function resetAll(){files.length=0;isRunning=false;document.getElementById("actionArea").classList.add("hidden");document.getElementById("resultsArea").classList.add("hidden");document.getElementById("resultsArea").innerHTML="";document.getElementById("welcomeArea").classList.remove("hidden");document.getElementById("sbAddMore").classList.add("hidden");document.querySelector(".sidebar").classList.remove("visible");document.querySelector(".main").classList.add("centered");renderFileList();updateBtn();inp.value=""}
function showError(m){document.getElementById("errorArea").classList.remove("hidden");document.getElementById("errorText").textContent=m}
function hideError(){document.getElementById("errorArea").classList.add("hidden")}
</script>
</body>
</html>
